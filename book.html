<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EZAC Service | Book Service</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/navbar.css">
  <link rel="stylesheet" href="assets/css/footer.css">
  <link rel="stylesheet" href="assets/css/forms.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html">EZAC</a>
      <nav class="site-nav" id="site-nav">
        <a href="index.html">Home</a>
        <a href="services.html">Services</a>
        <a href="pricing.html">Pricing</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a class="button button-primary" href="book.html">Book Now</a>
      </nav>
      <button class="menu-toggle" id="menu-toggle">Menu</button>
    </div>
  </header>

  <main>
    <section class="section page-head">
      <div class="container">
        <span class="eyebrow">Book Service</span>
        <h1>Schedule your technician visit</h1>
        <p>Choose your service, pick a time slot, and get a confirmation quickly.</p>
      </div>
    </section>

    <section class="section booking-form-section">
      <div class="container">
        <form class="booking-form" action="#" method="post">
          <label for="service">Service</label>
          <select id="service" name="service" required>
            <option value="ac-repair">AC Repair</option>
            <option value="ac-install">AC Installation</option>
            <option value="refrigerator">Refrigerator Repair</option>
            <option value="washing-machine">Washing Machine Repair</option>
            <option value="electrical">Electrical</option>
            <option value="plumbing">Plumbing</option>
          </select>

          <label for="name">Name</label>
          <input type="text" id="name" name="name" required>

          <label for="phone">Phone</label>
          <input type="tel" id="phone" name="phone" required>

          <label for="date">Preferred Date</label>
          <input type="date" id="date" name="date" required>

          <label for="notes">Notes</label>
          <textarea id="notes" name="notes" rows="4"></textarea>

          <button class="button button-primary" type="submit">Book Appointment</button>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="brand-block">
        <a class="brand" href="index.html">EZAC</a>
        <p>Reliable home services across the city.</p>
      </div>
      <nav class="footer-nav">
        <a href="services.html">Services</a>
        <a href="pricing.html">Pricing</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
      <p class="footer-copy">© 2026 EZAC Service. All rights reserved.</p>
    </div>
  </footer>

  <script src="assets/js/main.js"></script>
  <script src="assets/js/forms.js"></script>
</body>
</html>
